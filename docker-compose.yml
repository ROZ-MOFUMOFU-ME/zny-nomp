# Reproducible dev/local stack: the zny-nomp portal + Redis.
#
# Coin daemons are NOT included — each coin needs its own synced daemon. Point
# your pool_configs/*.json `daemons` at a reachable daemon (a host daemon via
# host.docker.internal, another container, or an external node).
#
#   docker compose up --build
#
# The portal reads config.json (falling back to config_example.json) and uses
# the REDIS_HOST/REDIS_PORT env vars (set below) to reach the redis service.

services:
  redis:
    image: redis:7-alpine
    # Dev defaults; harden (password/ACL, no exposed port) for production.
    command: ['redis-server', '--save', '60', '1']
    volumes:
      - redis-data:/data
    restart: unless-stopped

  portal:
    build: .
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    # Mount your real configs (gitignored). Without config.json the portal
    # falls back to config_example.json baked into the image.
    volumes:
      - ./config.json:/app/config.json:ro
      - ./pool_configs:/app/pool_configs:ro
      - ./coins:/app/coins:ro
    ports:
      - '8080:8080' # website (portalConfig.website.port)
      # CLI listener — must match cliPort in the config you mount (17117 in
      # config_example.json). Update both sides if your config.json differs.
      - '17117:17117'
      # Add your stratum ports here, e.g. - '3333:3333'
    restart: unless-stopped

volumes:
  redis-data:

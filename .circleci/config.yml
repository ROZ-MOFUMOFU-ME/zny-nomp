version: 2.1
orbs:
    node: circleci/node@7.1
jobs:
    test:
        parameters:
            node-version:
                type: string
        docker:
            - image: cimg/base:stable
        steps:
            - checkout
            - node/install:
                  node-version: << parameters.node-version >>
            - run:
                  name: Install Redis
                  command: |
                      sudo apt-get update
                      sudo apt-get install -y redis-server
            - run:
                  name: Run build
                  command: npm install
            - run:
                  name: Run test
                  command: npm run test
            - run:
                  name: Verify build and test
                  command: echo "Build and test completed successfully!"
workflows:
    build_and_test:
        jobs:
            - test:
                  matrix:
                      parameters:
                          node-version: ['20', '22', '24']

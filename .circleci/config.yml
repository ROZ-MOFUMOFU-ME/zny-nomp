version: 2.1
orbs:
    node: circleci/node@7.1
jobs:
    test:
        parameters:
            node-version:
                type: string
        docker:
            - image: cimg/base:stable
        steps:
            - checkout
            - node/install:
                  node-version: << parameters.node-version >>
            - run:
                  name: Install Redis and GCC 10 (C++20 for the multi-hashing addon)
                  command: |
                      sudo apt-get update
                      sudo apt-get install -y redis-server g++-10 gcc-10
                      sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100
                      sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100
            - run:
                  name: Run build
                  command: npm install
            - run:
                  name: Check config files parse
                  command: npm run check:config
            - run:
                  name: Run unit tests
                  command: npm run test:unit
            - run:
                  name: Run test
                  command: npm run test
            - run:
                  name: Verify build and test
                  command: echo "Build and test completed successfully!"
workflows:
    build_and_test:
        jobs:
            - test:
                  matrix:
                      parameters:
                          node-version: ['20', '22', '24']

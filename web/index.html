<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!-- Apply the saved/OS theme before first paint to avoid a flash. -->
        <script>
            (function () {
                try {
                    var t = localStorage.getItem('theme');
                    if (t !== 'light' && t !== 'dark')
                        t = matchMedia('(prefers-color-scheme: dark)').matches
                            ? 'dark'
                            : 'light';
                    if (t === 'dark')
                        document.documentElement.classList.add('dark');
                } catch (e) {}
                // Set <html lang> before first paint so Chrome doesn't briefly offer to
                // auto-translate the page; the app keeps it in sync after boot.
                try {
                    document.documentElement.lang =
                        localStorage.getItem('lang') ||
                        navigator.language ||
                        'en';
                } catch (e) {}
            })();
        </script>
        <link rel="icon" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="BitZeny node open mining portal" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"
        />
        <title>zny-nomp</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
